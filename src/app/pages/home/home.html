<div class="container mt-4">
  <h1>Lista de Filmes</h1>
  
  @if(filmes().length === 0) {
    <p>Nenhum filme encontrado.</p>
  } @else {
    <div class="filmes-grid">
      @for (filme of filmes(); track filme.id) {
        <app-card-filme [filme]="filme"></app-card-filme>
      }
    </div>
  }
</div>
