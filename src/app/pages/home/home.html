<div class="container mt-4">
  <h1>Lista de Filmes</h1>
  
  @if(filmes().length === 0) {
    <p>Nenhum filme encontrado.</p>
  } @else {
    <div class="row">
      @for (filme of filmes(); track filme.id) {
        <div class="col-md-3 mb-4">
          <div class="card">
            <img [src]="filme.image" class="card-img-top" [alt]="filme.name">
            <div class="card-body">
              <h5 class="card-title">{{ filme.name }}</h5>
              <p class="card-text">
                <span class="badge bg-primary">{{ filme.category }}</span>
              </p>
              <p class="card-text">
                <strong>R$ {{ filme.price }}</strong>
              </p>
              <a [routerLink]="['/visualizar-filme', filme.id]" class="btn btn-primary">Ver Detalhes</a>
            </div>
          </div>
        </div>
      }
    </div>
  }
</div>
